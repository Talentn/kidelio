<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA / theme -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#B85E6C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kidelio" />

    <!-- SEO -->
    <title>Kidelio — Mode &amp; jouets pour enfants</title>
    <meta name="description" content="Kidelio — La boutique en ligne dédiée aux bébés et enfants en Tunisie. Vêtements, jouets et essentiels à prix accessibles. Livraison rapide, paiement à la livraison." />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Kidelio" />
    <meta property="og:title" content="Kidelio — Mode &amp; jouets pour enfants" />
    <meta property="og:description" content="La boutique en ligne dédiée aux bébés et enfants en Tunisie. Vêtements, jouets et essentiels à prix accessibles." />
    <meta property="og:image" content="https://kideliowear.com/kidelio-logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://kideliowear.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_TN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kidelio — Mode &amp; jouets pour enfants" />
    <meta name="twitter:description" content="La boutique en ligne dédiée aux bébés et enfants en Tunisie. Livraison rapide, paiement à la livraison." />
    <meta name="twitter:image" content="https://kideliowear.com/kidelio-logo.png" />

    <!-- Critical CSS — avoids layout shift before Tailwind bundle loads -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
      body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff;color:#111827}
      #root{min-height:100dvh}
      .hero-slot{min-height:420px;background:#FDF8F5}
      @media(min-width:640px){.hero-slot{min-height:480px}}
      @media(min-width:768px){.hero-slot{min-height:560px}}
      @media(min-width:1024px){.hero-slot{min-height:620px}}
      .age-rail-slot{min-height:148px;background:#fff;border-bottom:1px solid #f3f4f6}
    </style>

    <!-- LCP hero image — home only -->
    <link rel="preload" as="image" href="/hero-kids.png" fetchpriority="high" data-lcp-hero />
    <script>
      (function () {
        var path = location.pathname;
        if (path !== "/" && path !== "") return;
        try {
          var saved = sessionStorage.getItem("kidelio_lcp_hero");
          if (saved) {
            var link = document.querySelector('link[data-lcp-hero]');
            if (link) link.href = saved;
          }
        } catch (e) {}
      })();
    </script>

    <!-- DNS prefetch for API / CDN -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://connect.facebook.net" />

    <!-- Fonts — preconnect then load async to avoid render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" />
    </noscript>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Aller au contenu principal</a>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
