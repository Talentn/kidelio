# Optional — add inside the kideliowear.com server {} block in daizo-nginx
# so WebSocket chat bypasses Rails/Next.js and goes straight to Go (port 3010).
#
# After adding, reload nginx and set VITE_ENABLE_CHAT_WS=true before deploy.
#
#   docker exec daizo-nginx nginx -t && docker exec daizo-nginx nginx -s reload

location ~ ^/api/v1/chat/(ws/|admin/ws) {
    rewrite ^/api/v1/(.*)$ /$1 break;
    proxy_pass             http://172.17.0.1:3010;
    proxy_http_version     1.1;
    proxy_set_header       Host              $host;
    proxy_set_header       X-Real-IP         $remote_addr;
    proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto $scheme;
    proxy_set_header       Upgrade           $http_upgrade;
    proxy_set_header       Connection        "upgrade";
    proxy_read_timeout     3600s;
    proxy_send_timeout     3600s;
}
