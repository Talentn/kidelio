# WebSocket routes → Go service (port 3010).
# Include inside the kideliowear.com server {} block:
#   include /path/to/nginx-ws-locations.conf;
#
# Host nginx (127.0.0.1): use this file as-is.
# daizo-nginx (Docker bridge): use deploy/daizo-nginx-ws.conf instead (172.17.0.1).

location ~ ^/api/v1/(chat/ws/.+|chat/admin/ws|cart/ws|cart/admin/ws|favorites/ws|favorites/admin/ws)$ {
    rewrite ^/api/v1/(.*)$ /$1 break;
    proxy_pass             http://127.0.0.1:3010;
    proxy_http_version     1.1;
    proxy_set_header       Host              $host;
    proxy_set_header       X-Real-IP         $remote_addr;
    proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto $scheme;
    proxy_set_header       Upgrade           $http_upgrade;
    proxy_set_header       Connection        "upgrade";
    proxy_read_timeout     3600s;
    proxy_send_timeout     3600s;
    proxy_buffering        off;
}
