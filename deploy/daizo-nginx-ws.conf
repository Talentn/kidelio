# WebSocket routes for daizo-nginx → Go on Docker host bridge (172.17.0.1:3010).
#
# INSTALL (once on VPS):
#   1. docker cp deploy/daizo-nginx-ws.conf daizo-nginx:/etc/nginx/kidelio-ws-locations.conf
#   2. Add inside the kideliowear.com server {} block (before other /api/ locations):
#        include /etc/nginx/kidelio-ws-locations.conf;
#   3. docker exec daizo-nginx nginx -t && docker exec daizo-nginx nginx -s reload
#
# Or run: bash deploy/setup-ws.sh

location ~ ^/api/v1/(chat/ws/.+|chat/admin/ws|cart/ws|cart/admin/ws|favorites/ws|favorites/admin/ws)$ {
    rewrite ^/api/v1/(.*)$ /$1 break;
    proxy_pass             http://172.17.0.1:3010;
    proxy_http_version     1.1;
    proxy_set_header       Host              $host;
    proxy_set_header       X-Real-IP         $remote_addr;
    proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto $scheme;
    proxy_set_header       Upgrade           $http_upgrade;
    proxy_set_header       Connection        "upgrade";
    proxy_read_timeout     3600s;
    proxy_send_timeout     3600s;
    proxy_buffering        off;
}
