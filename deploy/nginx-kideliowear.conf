# Kideliowear — Nginx reverse proxy config
#
# INSTALL ON VPS:
#   sudo cp nginx-kideliowear.conf /etc/nginx/sites-available/kideliowear
#   sudo ln -s /etc/nginx/sites-available/kideliowear /etc/nginx/sites-enabled/kideliowear
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL CERTIFICATE (run before enabling this file):
#   sudo certbot --nginx -d kideliowear.com -d www.kideliowear.com

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kideliowear.com www.kideliowear.com;

    # Allow Let's Encrypt ACME challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name kideliowear.com www.kideliowear.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/kideliowear.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kideliowear.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Allow large uploads (product images in admin)
    client_max_body_size 20M;

    # Timeouts for long-running requests
    proxy_connect_timeout 60s;
    proxy_read_timeout    60s;

    # Proxy all traffic to the Docker container
    location / {
        proxy_pass             http://127.0.0.1:7675;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto https;
        proxy_set_header       X-Forwarded-Host  $host;
        proxy_set_header       Connection        "";

        # Cache static assets at Nginx level (React build files are content-hashed)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass         http://127.0.0.1:7675;
            proxy_set_header   Host $host;
            proxy_cache_valid  200 1y;
            add_header         Cache-Control "public, max-age=31536000, immutable";
            access_log         off;
        }
    }
}
