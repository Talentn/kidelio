# Kideliowear — Nginx reverse proxy config
#
# INSTALL ON VPS:
#   sudo cp nginx-kideliowear.conf /etc/nginx/sites-available/kideliowear
#   sudo ln -s /etc/nginx/sites-available/kideliowear /etc/nginx/sites-enabled/kideliowear
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL CERTIFICATE (run before enabling this file):
#   sudo certbot --nginx -d kideliowear.com -d www.kideliowear.com
#
# Upstreams (Docker, localhost only):
#   Rails SPA + API  → 127.0.0.1:7675
#   Go (chat/cart)   → via Rails /api/go → 127.0.0.1:3010

# WebSocket upgrade map (http context — valid in sites-available on Debian/Ubuntu)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kideliowear.com www.kideliowear.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect www → non-www (canonical)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.kideliowear.com;

    ssl_certificate     /etc/letsencrypt/live/kideliowear.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kideliowear.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://kideliowear.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name kideliowear.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/kideliowear.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kideliowear.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;



    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Allow large uploads (product images in admin)
    client_max_body_size 20M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_read_timeout    60s;

    # ── Immutable static assets (JS/CSS are content-hashed by Vite) ──────────
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        proxy_pass             http://127.0.0.1:7675;
        proxy_set_header       Host $host;
        add_header             Cache-Control "public, max-age=31536000, immutable";
        add_header             Vary "Accept-Encoding";
        access_log             off;
    }

    # ── Images — long cache, revalidate ──────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        proxy_pass             http://127.0.0.1:7675;
        proxy_set_header       Host $host;
        add_header             Cache-Control "public, max-age=2592000";
        add_header             Vary "Accept-Encoding";
        access_log             off;
    }

    # ── API — no caching ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass             http://127.0.0.1:7675;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto https;
        proxy_set_header       Connection        $connection_upgrade;
        add_header             Cache-Control "no-store";
    }

    # ── Everything else (SPA HTML + Rails routes; /api/go proxied by Rails to Go) ─
    location / {
        proxy_pass             http://127.0.0.1:7675;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto https;
        proxy_set_header       X-Forwarded-Host  $host;
        proxy_set_header       Connection        $connection_upgrade;

        # HTML must revalidate — never cache the SPA shell
        add_header             Cache-Control "no-cache, must-revalidate";
    }
}
