services:
  web:
    build:
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "7675:80"         # host:container
    env_file: .env.production
    volumes:
      - ../api/storage:/rails/storage   # SQLite DBs + Active Storage uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
